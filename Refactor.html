<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ritik Portfolio</title>

<style>

/* Smooth Scrolling */
html{
scroll-behavior:smooth;
}

/* Gradient Animated Background */

body{
margin:0;
font-family:Arial;
color:black;
overflow-x:hidden;

background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
background-size:400% 400%;
animation:bgAnimation 12s ease infinite;
}

/* Gradient Animation */

@keyframes bgAnimation{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* Wave Animation */

.wave{
position:fixed;
bottom:0;
left:0;
width:200%;
height:120px;
background:rgba(255,255,255,0.25);
border-radius:40%;
animation:waveMove 10s linear infinite;
z-index:-2;
}

.wave2{
bottom:20px;
opacity:0.5;
animation-duration:16s;
}

.wave3{
bottom:40px;
opacity:0.3;
animation-duration:22s;
}

@keyframes waveMove{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

/* Orbit Animation */

.orbit{
position:fixed;
top:50%;
left:50%;
width:600px;
height:600px;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:-1;
}

.orbit span{
position:absolute;
width:20px;
height:20px;
background:rgba(255,255,255,0.7);
border-radius:50%;
box-shadow:0 0 20px white;
animation:rotate 20s linear infinite;
}

.orbit span:nth-child(1){
top:0;
left:50%;
animation-duration:18s;
}

.orbit span:nth-child(2){
top:50%;
left:0;
animation-duration:22s;
}

.orbit span:nth-child(3){
bottom:0;
left:50%;
animation-duration:26s;
}

.orbit span:nth-child(4){
top:50%;
right:0;
animation-duration:30s;
}

@keyframes rotate{

0%{
transform:rotate(0deg) translateX(300px) rotate(0deg);
}

100%{
transform:rotate(360deg) translateX(300px) rotate(-360deg);
}

}

/* Header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#333;
color:white;
position:sticky;
top:0;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-size:18px;
}

/* Sections */

section{
padding:100px;
text-align:center;
}

/* Content Boxes */

.box{
background:white;
padding:40px;
max-width:600px;
margin:auto;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.4s;
}

.box:hover{
transform:translateY(-10px);
}

/* Form */

input{
display:block;
margin:10px auto;
padding:10px;
width:220px;
border:1px solid #ccc;
border-radius:5px;
}

/* Button */

button{
padding:10px 20px;
cursor:pointer;
border:none;
background:#007BFF;
color:white;
border-radius:5px;
}

/* Dark Mode */

.dark{
color:white;
background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000000);
background-size:400% 400%;
animation:bgAnimation 12s ease infinite;
}

.dark header{
background:black;
}

.dark .box{
background:#1e1e1e;
color:white;
}

</style>

</head>

<body>

<!-- Orbit Animation -->
<div class="orbit">
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<!-- Wave Background -->
<div class="wave"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>

<header>

<h2>Ritik Gurjar</h2>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<button id="darkBtn">🌙 Dark Mode</button>

</header>

<section id="home">

<div class="box">
<h1>Welcome</h1>
<p>This is my personal portfolio website.</p>
</div>

</section>

<section id="about">

<div class="box">
<h1>About Me</h1>
<p>I am a BCA student learning Web Development.</p>
</div>

</section>

<section id="projects">

<div class="box">
<h1>Projects</h1>
<p>My upcoming web development projects will appear here.</p>
</div>

</section>

<section id="contact">

<div class="box">

<h1>Contact Me</h1>

<form id="contactForm">

<input type="text" id="name" placeholder="Enter your name">
<input type="email" id="email" placeholder="Enter your email">

<button type="submit">Submit</button>

</form>

</div>

</section>

<script>

/* Dark Mode Toggle */

const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click", () => {

document.body.classList.toggle("dark");

darkBtn.textContent = document.body.classList.contains("dark")
? "☀ Light Mode"
: "🌙 Dark Mode";

});

/* Form Validation */

const form = document.getElementById("contactForm");

form.addEventListener("submit", (event) => {

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();

if (!name || !email) {
alert("Please fill all fields");
event.preventDefault();
return;
}

if (!email.includes("@")) {
alert("Enter a valid email");
event.preventDefault();
return;
}

alert("Form submitted successfully!");

});

</script>

</body>
</html>
